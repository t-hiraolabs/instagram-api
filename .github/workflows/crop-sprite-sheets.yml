name: Crop pending sprite sheets

# 管理画面からアップロードされた素材シート（asset_sheets.status='uploaded'）を
# scripts/crop_sprite_sheet.py --once で定期的に処理する。
# 手動で今すぐ実行したい場合は Actions タブから "Run workflow" でも起動できる。

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  crop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Process pending sprite sheets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/crop_sprite_sheet.py --once
